# Prospector dongle configuration

# Use ambient light sensor for auto brightness (set to n if building without one)
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=y

# Set fixed display brightness when not using ambient light sensor (1-100)
# CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=50

# Rotate the display 180 degrees (set to y if needed)
# CONFIG_PROSPECTOR_PROSPECTOR_ROTATE_DISPLAY_180=n

# Convert layer names to all caps
# CONFIG_PROSPECTOR_LAYER_ROLLER_ALL_CAPS=n
